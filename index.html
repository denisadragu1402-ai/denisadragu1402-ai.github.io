<!DOCTYPE html>
<html lang="ro">

    <meta charset="UTF-8">
    <title>ECHO RT - Command Center</title>

    <style>
        :root {
            --bg: #020617; --card: #0f172a; --cyan: #00f2ff;
            --green: #22c55e; --orange: #f59e0b; --red: #ef4444;
            --text: #f8fafc; --subtext: #64748b;
        }

        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 40px 20px;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .dashboard { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
            width: 100%; max-width: 800px; 
        }

        .card { 
            background: var(--card); border: 1px solid #1e293b; 
            padding: 30px; border-radius: 24px; text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .full-width { grid-column: 1 / span 2; }
        .label { color: var(--subtext); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 15px; display: block; }
        .value { font-size: 4rem; font-weight: 800; display: block; line-height: 1; margin: 10px 0; }
        
        /* Culori Status */
        .st-siguranta { color: var(--green); }
        .st-obstacol { color: var(--orange); }
        .st-pericol { color: var(--red); animation: pulse 1s infinite; }

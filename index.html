<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO SYSTEM - IoT Cloud Monitor</title>
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --accent-cyan: #64ffda;
            --alert-red: #ff4b2b;
            --text-main: #e6f1ff;
            --text-dim: #8892b0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(100, 255, 218, 0.1);
        }

        h1 {
            color: var(--accent-cyan);
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .data-card {
            background: rgba(10, 25, 47, 0.5);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .label {
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            display: block;
        }

        .value {
            font-size: 3rem;
            font-weight: bold;
            display: block;
        }

        .unit {
            font-size: 1.2rem;
            margin-left: 5px;
            color: var(--text-dim);
        }

        /* Clasele pentru Status */
        .status-ok {
            color: var(--accent-cyan);
            text-shadow: 0 0 10px rgba(100, 255, 218, 0.3);
        }

        .status-alert {
            color: var(--alert-red);
            text-shadow: 0 0 15px rgba(255, 75, 43, 0.4);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        #last-update {
            color: var(--accent-cyan);
            font-weight: bold;
        }

        /* Animatie puls pentru Pericol */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .pulse-effect {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ECHO SYSTEM</h1>
        <div class="subtitle">IOT CLOUD MONITOR V1.1</div>

        <div class="data-card">
            <span class="label">Distanță Obstacol</span>
            <span id="distanta" class="value">--<span class="unit">cm</span></span>
        </div>

        <div class="data-card">
            <span class="label">Status Perimetru</span>
            <span id="alerta" class="value status-ok">NOMINAL</span>
        </div>

        <div class="footer">
            Ultima actualizare Cloud: <span id="last-update">--:--:--</span>
        </div>
    </div>

    <script>
        // CONFIGURARE THINGSPEAK
        const channelID = '3325389';
        const readAPIKey = '446NMXGKO5WC319U';

        async function fetchThingSpeakData() {
            const url = `https://api.thingspeak.com/channels/${channelID}/fields/1/last.json?api_key=${readAPIKey}&nocache=${Date.now()}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data && data.field1 !== null) {
                    const distantaVal = parseInt(data.field1);
                    updateInterface(distantaVal, data.created_at);
                }
            } catch (error) {
                console.error("Eroare la preluarea datelor:", error);
                document.getElementById('alerta').innerText = "OFFLINE";
            }
        }

        function updateInterface(dist, time) {
            // 1. Update Distanță
            document.getElementById('distanta').innerHTML = `${dist}<span class="unit">cm</span>`;
            
            // 2. Logică Alertă (Sincronizată cu Arduino - 10cm)
            const alertaEl = document.getElementById('alerta');
            
            if (dist <= 10 && dist > 0) {
                alertaEl.innerText = "PERICOL";
                alertaEl.className = "value status-alert pulse-effect";
            } 
            else if (dist === 0) {
                alertaEl.innerText = "BLOCAT/0 CM";
                alertaEl.className = "value status-alert";
            }
            else {
                alertaEl.innerText = "NOMINAL";
                alertaEl.className = "value status-ok";
            }

            // 3. Update Timp
            const date = new Date(time);
            document.getElementById('last-update').innerText = date.toLocaleTimeString();
        }

        // Pornim monitorizarea
        fetchThingSpeakData();
        
        // Refresh la fiecare 16 secunde (limita ThingSpeak)
        setInterval(fetchThingSpeakData, 16000);
    </script>
</body>
</html>

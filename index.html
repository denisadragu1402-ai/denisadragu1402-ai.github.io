

<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Dashboard - Bi-Directional</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --bg-dark: #0d0612; 
            --card-bg: #1a0f26;
            --neon-purple: #b050ff;
            --neon-pink: #ff00ff; 
            --text-gray: #8e6b9c;
            --text-light: #d0a0ff;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-light); 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 { letter-spacing: 5px; text-shadow: 0 0 10px var(--neon-purple); margin-bottom: 20px; }

        .dashboard {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(176, 80, 255, 0.2);
            text-align: center;
            width: 350px;
        }

        .label { font-size: 0.75em; color: var(--text-gray); text-transform: uppercase; margin-bottom: 10px; }
        .value { font-size: 3.5em; font-weight: 900; color: var(--neon-purple); margin-bottom: 20px; }

        /* Butonul Interactiv pentru Trimitere Date */
        .btn-ham {
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
            margin-top: 20px;
        }

        .btn-ham:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        .btn-ham:active { transform: scale(0.95); }

        /* Status primire date (Butonul fizic) */
        .status-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #3d2354;
        }

        .active-alert {
            color: var(--neon-pink) !important;
            animation: pulse 1s infinite;
            font-weight: bold;
        }

        .footer-tech {
            position: fixed;
            bottom: 15px;
            font-size: 0.7em;
            color: var(--text-gray);
            display: flex;
            gap: 20px;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1>ECHO SYSTEM</h1>

    <div class="dashboard">
        <div class="label">Distanță Senzor</div>
        <div id="dist-val" class="value">-- cm</div>
        
        <div class="label">Control Robot</div>
        <button class="btn-ham" onclick="trimiteHam()">Comandă: HAM HAM</button>

        <div class="status-box">
            <div class="label">Status Buton Fizic</div>
            <div id="ham-status" style="color: var(--text-gray);">INACTIV</div>
        </div>
    </div>

    <div class="footer-tech">
        <span id="net-status">Status: Conectare...</span>
        <span>Refresh: Live (WebSockets)</span>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://echo-bd4aa-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. PRIMIRE DATE: Distanța
        db.ref('sistem/distanta').on('value', (snap) => {
            document.getElementById('dist-val').innerText = (snap.val() || 0) + " cm";
        });

        // 2. PRIMIRE DATE: Status Buton Fizic (de la Arduino/ESP)
        db.ref('trigger_buton').on('value', (snap) => {
            const statusEl = document.getElementById('ham-status');
            if(snap.val() == 1) {
                statusEl.innerText = "BUTON APĂSAT PE ROBOT!";
                statusEl.className = "active-alert";
            } else {
                statusEl.innerText = "INACTIV";
                statusEl.className = "";
            }
        });

        // 3. TRIMITERE DATE: Comanda HAM HAM de pe site
        function trimiteHam() {
            // Scriem în Firebase la o cale nouă numită 'comanda_voce' sau 'ham_ham'
            // Robotul tău (Arduino) trebuie să asculte această cale
            db.ref('comanda_ham').set(1);
            
            console.log("Comandă trimisă!");

            // Resetăm după 2 secunde (ca să poată fi trimisă din nou)
            setTimeout(() => {
                db.ref('comanda_ham').set(0);
            }, 2000);
        }

        // Status Conexiune
        db.ref('.info/connected').on('value', (snap) => {
            document.getElementById('net-status').innerText = snap.val() ? "Status: Online" : "Status: Offline";
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO - Monitorizare Prototip</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0a192f; color: #e6f1ff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #112240; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-left: 5px solid #64ffda; width: 350px; }
        h1 { color: #64ffda; font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; border-bottom: 1px solid #233554; padding-bottom: 0.5rem; }
        .stat { margin-bottom: 1.2rem; display: flex; justify-content: space-between; align-items: center; }
        .label { font-weight: bold; color: #8892b0; text-transform: uppercase; font-size: 0.8rem; }
        .value { font-family: 'Courier New', Courier, monospace; font-size: 1.2rem; color: #ccd6f6; }
        .status-ok { color: #64ffda; }
        .status-alert { color: #f44336; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>ECHO SYSTEM V1.0</h1>
    
    <div class="stat">
        <span class="label">Senzor Obstacol:</span>
        <span id="distanta" class="value">-- cm</span>
    </div>

    <div class="stat">
        <span class="label">Stare Alertă:</span>
        <span id="alerta" class="value status-ok">NOMINAL</span>
    </div>

    <div class="stat">
        <span class="label">Răspuns Utilizator:</span>
        <span id="vocal" class="value">AȘTEPTARE...</span>
    </div>

    <div class="stat">
        <span class="label">Conexiune Cloud:</span>
        <span class="value status-ok">ONLINE</span>
    </div>
</div>

<script>
    // Exemplu de funcție care ar actualiza datele primite de la Arduino (via API/Websocket)
    function updateData(dist, status, voice) {
        document.getElementById('distanta').innerText = dist + " cm";
        const alertaEl = document.getElementById('alerta');
        
        if(dist < 50) {
            alertaEl.innerText = "OBSTACOL APROAPE";
            alertaEl.className = "value status-alert";
        } else {
            alertaEl.innerText = "NOMINAL";
            alertaEl.className = "value status-ok";
        }
        
        document.getElementById('vocal').innerText = voice;
    }

    // Simulare primire date pentru demo (se poate șterge după integrare)
    setTimeout(() => updateData(45, "ALERT", "DA"), 2000);
</script>

</body>
</html>

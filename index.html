<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #0b0b0b; 
            color: white; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Ora live - discretă, în colțul din dreapta sus */
        #live-clock {
            position: fixed;
            top: 20px;
            right: 25px;
            font-size: 0.85em;
            color: #444; /* Culoare gri închisă pentru a fi discretă */
            font-family: monospace;
        }

        h1 { 
            margin-bottom: 40px; 
            letter-spacing: 4px; 
            color: #ffffff; 
            font-weight: 300;
        }

        .dashboard {
            background: #161616;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            text-align: center;
            width: 350px;
            border: 1px solid #222;
        }

        .label { 
            font-size: 0.75em; 
            color: #666; 
            text-transform: uppercase; 
            margin-bottom: 10px; 
            letter-spacing: 1px;
        }
        
        /* Valori principale */
        .value { 
            font-size: 4em; 
            font-weight: bold; 
            margin-bottom: 15px; 
            transition: all 0.4s ease; 
        }

        .status-text { 
            font-size: 1.2em; 
            font-weight: bold; 
            margin-top: 5px;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.4s ease;
        }

        /* Stări culori */
        .safe { color: #2ecc71; }    /* Verde */
        .danger { color: #e74c3c; }  /* Roșu */
        .neutral { color: #3498db; } /* Albastru */

        /* Secțiunea de jos pentru buton */
        .last-press-box {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid #252525;
        }

        #last-time {
            font-size: 1.4em;
            color: #eee;
            display: block;
            margin-top: 5px;
        }

        .blink {
            animation: blinker 1s linear 2;
        }

        @keyframes blinker {
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div id="live-clock">00:00:00</div>

    <h1>ECHO SYSTEM</h1>

    <div class="dashboard">
        <div class="label">Distanță Detectată</div>
        <div id="dist-val" class="value neutral">--</div>
        
        <div class="label">Stare Senzor</div>
        <div id="status-msg" class="status-text">INIȚIALIZARE...</div>

        <div class="last-press-box">
            <div class="label">Ultima activare buton</div>
            <span id="last-time">--:--:--</span>
        </div>
    </div>

    <script>
        // --- CONFIGURARE FIREBASE ---
        const firebaseConfig = {
            databaseURL: "https://echo-bd4aa-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Funcție Ora Live (Discretă)
        function updateClock() {
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ":" + 
                               now.getMinutes().toString().padStart(2, '0') + ":" + 
                               now.getSeconds().toString().padStart(2, '0');
            document.getElementById('live-clock').innerText = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Elemente DOM
        const distElement = document.getElementById('dist-val');
        const statusElement = document.getElementById('status-msg');
        const lastTimeElement = document.getElementById('last-time');

        // --- LOGICĂ FIREBASE ---

        // Flag pentru a ignora prima citire la refresh
        let primaIncarcareButon = true;

        // Ascultare Distanță
        db.ref('sistem').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const d = data.distanta;
                distElement.innerText = d + " cm";

                if (d <= 10) {
                    distElement.className = "value danger";
                    statusElement.innerText = "PERICOL: OBIECT APROAPE!";
                    statusElement.className = "status-text danger";
                } else {
                    distElement.className = "value safe";
                    statusElement.innerText = "SISTEM OK";
                    statusElement.className = "status-text safe";
                }
            }
        });

        // Ascultare Buton (cu protecție la refresh)
        db.ref('trigger_buton').on('value', (snapshot) => {
            const val = snapshot.val();
            
            if (val) {
                // Dacă este prima dată când primim datele după deschiderea paginii, ignorăm
                if (primaIncarcareButon) {
                    primaIncarcareButon = false;
                    console.log("Prima citire ignorată (anti-refresh)");
                    return; 
                }

                // Dacă ajungem aici, înseamnă că butonul a fost apăsat PE BUNE acum
                const now = new Date();
                const oraApasare = now.getHours().toString().padStart(2, '0') + ":" + 
                                   now.getMinutes().toString().padStart(2, '0') + ":" + 
                                   now.getSeconds().toString().padStart(2, '0');
                
                lastTimeElement.innerText = oraApasare;
                
                // Efect vizual de alertă
                lastTimeElement.className = "blink";
                lastTimeElement.style.color = "#e74c3c";
                
                setTimeout(() => { 
                    lastTimeElement.style.color = "#eee";
                    lastTimeElement.className = "";
                }, 2000);
            }
        });
    </script>
</body>
</html>

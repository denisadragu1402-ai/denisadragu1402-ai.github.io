<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO System Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --neon: #00f2ff;
            --bg: #0a0a0c;
            --card: #16161d;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
        }

        h1 { font-size: 1.5rem; letter-spacing: 2px; color: #888; margin-bottom: 2rem; }

        .data-box { margin-bottom: 2rem; }

        .label { font-size: 0.8rem; text-transform: uppercase; color: #555; margin-bottom: 0.5srem; }

        .value {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--neon);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .unit { font-size: 1.2rem; margin-left: 5px; color: #444; }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            background: #222;
            font-size: 0.8rem;
            border: 1px solid #444;
            transition: all 0.3s;
        }

        .active {
            background: #00ff8822;
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ECHO LIVE SYSTEM</h1>

        <div class="data-box">
            <div class="label">Distanță Senzor</div>
            <div class="value" id="dist-val">--<span class="unit">cm</span></div>
        </div>

        <div class="data-box">
            <div class="label">Status Buton Fizic</div>
            <div id="btn-status" class="status-badge">INACTIV</div>
        </div>

        <div style="font-size: 0.6rem; color: #333; margin-top: 1rem;">
            ID Proiect: echo-bd4aa
        </div>
    </div>

    <script>
        // Configurația Firebase (Preluată din codul tău Arduino)
        const firebaseConfig = {
            databaseURL: "https://echo-bd4aa-default-rtdb.europe-west1.firebasedatabase.app"
        };

        // Inițializare Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. Ascultă Distanța (din sistem/distanta)
        database.ref('sistem').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.distanta !== undefined) {
                document.getElementById('dist-val').innerHTML = data.distanta + '<span class="unit">cm</span>';
                
                // Schimbă culoarea dacă e prea aproape (vizual pe site)
                if(data.distanta <= 20) {
                    document.getElementById('dist-val').style.color = "#ff4444";
                } else {
                    document.getElementById('dist-val').style.color = "#00f2ff";
                }
            }
        });

        // 2. Ascultă Butonul
        // Verificăm dacă valoarea trigger_buton se schimbă
        database.ref('trigger_buton').on('value', (snapshot) => {
            const statusBadge = document.getElementById('btn-status');
            statusBadge.innerText = "APĂSAT!";
            statusBadge.classList.add('active');

            // Revenire la starea inactivă după 1.5 secunde (efect vizual)
            setTimeout(() => {
                statusBadge.innerText = "INACTIV";
                statusBadge.classList.remove('active');
            }, 1500);
        });
    </script>
</body>
</html>

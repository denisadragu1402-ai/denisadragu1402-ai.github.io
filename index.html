<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO SYSTEM - Command Center</title>
    <style>
        :root {
            --bg-color: #050a14;
            --card-bg: #0b1528;
            --accent-cyan: #00f2ff;
            --alert-red: #ff3c3c;
            --text-main: #e6f1ff;
            --text-dim: #707d91;
            --border: 1px solid rgba(0, 242, 255, 0.2);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace; /* Aspect tehnic */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        @media (max-width: 600px) {
            .dashboard { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            border: var(--border);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent-cyan);
            padding-bottom: 10px;
        }

        .label {
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: block;
        }

        .value {
            font-size: 3rem;
            font-weight: bold;
        }

        .status-ok { color: var(--accent-cyan); }
        .status-alert { color: var(--alert-red); animation: blink 1s infinite; }

        /* SECTIUNE JURNAL */
        .journal-container {
            grid-column: 1 / -1;
            background: var(--card-bg);
            border: var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: left;
        }

        .journal-header {
            color: var(--accent-cyan);
            border-bottom: 1px solid var(--text-dim);
            padding-bottom: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .journal-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 250px;
            overflow-y: auto;
        }

        .journal-entry {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        .journal-entry:nth-child(even) { background: rgba(255,255,255,0.02); }

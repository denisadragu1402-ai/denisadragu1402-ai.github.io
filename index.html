<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO COMMAND CENTER</title>
    <style>
        :root {
            --bg: #050a14;
            --card: #0b1528;
            --cyan: #00f2ff;
            --red: #ff3c3c;
            --text: #e6f1ff;
            --dim: #707d91;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: var(--cyan);
            letter-spacing: 4px;
            border-bottom: 2px solid var(--cyan);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .label { color: var(--dim); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .value { font-size: 3rem; font-weight: bold; }

        .status-ok { color: var(--cyan); }
        .status-alert { color: var(--red); animation: blink 1s infinite; }
        .status-btn { color: #f7ff00; text-shadow: 0 0 10px rgba(247, 255, 0, 0.5); }

        /* JURNAL */
        .journal-container { grid-column: 1 / -1; text-align: left; }
        .journal-list { list-style: none; padding: 0; margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .entry {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }
        .tag { background: #1a2f4d; color: var(--cyan); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-right: 10px; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .footer { margin-top: 40px; font-size: 0.7rem; color: var(--dim); }
    </style>
</head>
<body>

    <h1>ECHO COMMAND CENTER</h1>

    <div class="dashboard">
        <div class="card">
            <span class="label">Radar Distanță</span>
            <span id="distanta" class="value">-- cm</span>
        </div>

        <div class="card">
            <span class="label">Status Perimetru</span>
            <span id="status" class="value status-ok">SCANNING</span>
        </div>

        <div class="card journal-container">
            <span class="label">Jurnal Activitate Buton (Ultimele 10)</span>
            <ul id="journal-list" class="journal-list">
                <li class="entry">Sincronizare cu serverul...</li>
            </ul>
        </div>
    </div>

    <div class="footer">
        SERVER_REFRESH: 16s | SYNC_TIME: <span id="sync-time">--:--:--</span>
    </div>

    <script>
        const channelID = '3325389';
        const readKey = '446NMXGKO5WC319U';

        async function updateData() {
            const url = `https://api.thingspeak.com/channels/${channelID}/feeds.json?results=10&api_key=${readKey}&nocache=${Date.now()}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.feeds && data.feeds.length > 0) {
                    const latest = data.feeds[data.feeds.length - 1];
                    const dist = parseInt(latest.field1);
                    const btn = parseInt(latest.field2);

                    // 1. Update Distanta (Filtram vizual cifra 0 pe site daca e dubioasa)
                    document.getElementById('distanta').innerText = (dist > 0) ? dist + " cm" : "SCANNING...";

                    // 2. Update Status (Ierarhie: Buton > Distanta > Nominal)
                    const statusEl = document.getElementById('status');
                    if (btn === 1) {
                        statusEl.innerText = "ACTIVAT";
                        statusEl.className = "value status-btn";
                    } else if (dist <= 10 && dist > 0) {
                        statusEl.innerText = "PERICOL";
                        statusEl.className = "value status-alert";
                    } else {
                        statusEl.innerText = "NOMINAL";
                        statusEl.className = "value status-ok";
                    }

                    // 3. Update Jurnal
                    const listEl = document.getElementById('journal-list');
                    listEl.innerHTML = "";
                    [...data.feeds].reverse().forEach(f => {
                        if (f.field2 == "1") {
                            const time = new Date(f.created_at).toLocaleTimeString();
                            const date = new Date(f.created_at).toLocaleDateString();
                            listEl.innerHTML += `<li class="entry"><span><span class="tag">BUTON</span>${date}</span><span>${time}</span></li>`;
                        }
                    });

                    document.getElementById('sync-time').innerText = new Date(latest.created_at).toLocaleTimeString();
                }
            } catch (e) { console.log("Eroare date:", e); }
        }

        setInterval(updateData, 16000);
        updateData();
    </script>
</body>
</html>
